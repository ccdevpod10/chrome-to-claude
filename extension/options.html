<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Claude Code Bridge — Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 460px;
      background: #1e1e2e;
      color: #cdd6f4;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      color: #89b4fa;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    label {
      font-size: 12px;
      color: #a6adc8;
      font-weight: 500;
    }

    input[type="text"],
    input[type="number"] {
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 6px;
      color: #cdd6f4;
      padding: 7px 10px;
      font-size: 13px;
      outline: none;
      width: 100%;
    }

    input:focus { border-color: #89b4fa; }

    .hint {
      font-size: 11px;
      color: #6c7086;
    }

    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    button {
      background: #5c6bc0;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover { background: #7986cb; }

    button.secondary {
      background: #313244;
      color: #cdd6f4;
      border: 1px solid #45475a;
      font-weight: 400;
    }

    button.secondary:hover { border-color: #6c7086; }

    #status {
      font-size: 12px;
      color: #a6e3a1;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <h1>Claude Code Bridge — Settings</h1>

  <div class="field">
    <label for="bridgePort">Bridge port</label>
    <input type="number" id="bridgePort" min="1024" max="65535" placeholder="8765" />
    <span class="hint">Default: 8765. Change if the port is already in use.</span>
  </div>

  <div class="field">
    <label for="model">Model override</label>
    <input type="text" id="model" placeholder="Leave blank to use CLI default" />
    <span class="hint">E.g. claude-opus-4-6. Passed as --model flag when set.</span>
  </div>

  <div class="actions">
    <button id="save">Save</button>
    <button id="clear-history" class="secondary">Clear conversation history</button>
  </div>

  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
